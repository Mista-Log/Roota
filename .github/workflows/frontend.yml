name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "Frontend/**"

  pull_request:
    branches:
      - main
    paths:
      - "Frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build